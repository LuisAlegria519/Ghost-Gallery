<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Ghost Gallery AR View</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
    <style>
      html, body { margin: 0; overflow: hidden; background: transparent !important; }
      #ui-overlay {
        position: absolute;
        bottom: 20px;
        left: 0;
        width: 100%;
        text-align: center;
        z-index: 999;
        font-family: sans-serif;
        color: white;
        text-shadow: 0 0 10px rgba(0,255,255,0.8);
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <div id="ui-overlay">
      <div style="position: absolute; top: -20px; left: 16px; right: 16px; display: flex; justify-content: space-between;">
        <a href="/" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px; color: white; text-decoration: none;">Exit AR</a>
      </div>
      <h2 id="location-text" style="margin-bottom: 5px; font-weight: bold;">Loading Location...</h2>
      <p style="margin: 0; font-size: 14px;">Point camera at Hiro Marker to see art</p>
    </div>

    <div id="start-screen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color, black); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;">
      <h2 style="color: white; margin-bottom: 24px; font-family: sans-serif;">Ready to View Art?</h2>
      <button id="start-btn" style="padding: 16px 32px; font-size: 1.1rem; border-radius: 30px; border: 1px solid rgba(0,243,255,0.5); background: rgba(0,243,255,0.1); color: white; cursor: pointer; box-shadow: 0 0 20px rgba(0,243,255,0.2);">Tap to Start Camera</button>
      <a href="/" style="margin-top: 24px; color: #a0a0a0; text-decoration: none; font-family: sans-serif;">Cancel</a>
    </div>

    <!-- AR Scene -->
    <a-scene 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="alpha: true;"
    >
      <a-marker preset="hiro">
        <a-box position="0 0.5 0" material="color: magenta; transparent: true; opacity: 0.8;" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"></a-box>
        <a-text value="Ghost Gallery Art Placeholder" position="-1.5 1.5 0" color="cyan"></a-text>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Extract building and floor from URL params
      const urlParams = new URLSearchParams(window.location.search);
      const building = urlParams.get('b');
      const floor = urlParams.get('f');

      if (building && floor) {
        document.getElementById('location-text').innerText = `Building ${building} - Floor ${floor}`;
      } else {
        document.getElementById('location-text').innerText = `Ghost Gallery`;
      }

      document.getElementById('start-btn').addEventListener('click', function() {
        document.getElementById('start-screen').style.display = 'none';
        
        // Force video play and check for errors
        const checkVideo = setInterval(() => {
          const video = document.querySelector('video');
          if (video) {
            video.play().catch(e => {
              console.error('Camera play error:', e);
              alert('Camera blocked or failed to start. Please check browser permissions.');
            });
            clearInterval(checkVideo);
          }
        }, 500);
        
        // Stop checking after 10 seconds to avoid infinite loop
        setTimeout(() => clearInterval(checkVideo), 10000);
      });
    </script>
  </body>
</html>
